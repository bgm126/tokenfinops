name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tokenfinops
          POSTGRES_PASSWORD: tokenfinops
          POSTGRES_DB: tokenfinops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv and dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        uv pip install --system -e ".[all]"
        uv pip install --system ruff mypy pytest

    - name: Run Ruff Lint check
      run: |
        ruff check src/

    - name: Run Ruff Formatter check
      run: |
        ruff format --check src/

    - name: Run Type Checking (mypy)
      run: |
        mypy src/

    - name: Run Unit Tests
      run: |
        pytest
      env:
        DATABASE_URL: postgresql://tokenfinops:tokenfinops@localhost:5432/tokenfinops
        REDIS_URL: redis://localhost:6379/0
