version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokenfinops-postgres
    environment:
      POSTGRES_USER: tokenfinops
      POSTGRES_PASSWORD: tokenfinops
      POSTGRES_DB: tokenfinops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenfinops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tokenfinops-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tokenfinops-app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://tokenfinops:tokenfinops@postgres:5432/tokenfinops
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app

volumes:
  pgdata:
  redisdata:
